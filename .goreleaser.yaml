version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: "server"
    goos: [linux]
    main: .
    binary: ticketbot
    ldflags:
      - -s -w -X main.serverVersion={{ .Version }}

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

after:
  hooks:
    - make docker-build
    - make deploy-container

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

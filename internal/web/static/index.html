<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        const t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        document.documentElement.setAttribute('data-theme', t)
    </script>
</head>
<body>

<!-- Login -->
<div id="login" class="screen hidden">
    <div class="login-card">
        <div class="login-brand">
            <div class="brand-mark">T</div>
            <span class="brand-name">Ticketbot</span>
        </div>
        <div>
            <h1>Sign in</h1>
            <p>Enter your credentials to continue</p>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button id="login-btn" class="btn btn-primary" onclick="login()">Continue</button>
        <p id="login-err" class="error-text hidden"></p>
    </div>
</div>

<!-- TOTP Verify -->
<div id="totp-verify" class="screen hidden">
    <div class="login-card">
        <div class="login-brand">
            <div class="brand-mark">T</div>
            <span class="brand-name">Ticketbot</span>
        </div>
        <div>
            <h1>Two-factor auth</h1>
            <p>Enter the 6-digit code from your authenticator app, or use a recovery code.</p>
        </div>
        <div class="form-group">
            <input id="totp-code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="000000" maxlength="20">
        </div>
        <button id="totp-btn" class="btn btn-primary" onclick="submitTOTPVerify()">Verify</button>
        <p id="totp-err" class="error-text hidden"></p>
    </div>
</div>

<!-- Password Reset -->
<div id="password-reset" class="screen hidden">
    <div class="login-card">
        <div class="login-brand">
            <div class="brand-mark">T</div>
            <span class="brand-name">Ticketbot</span>
        </div>
        <div>
            <h1>Change password</h1>
            <p>Your password must be changed before continuing.</p>
        </div>
        <div class="form-group">
            <label>Current password</label>
            <input id="reset-current" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div class="form-group">
            <label>New password</label>
            <input id="reset-new" type="password" placeholder="••••••••" autocomplete="new-password">
            <div id="reset-reqs" class="pwd-reqs"></div>
        </div>
        <div class="form-group">
            <label>Confirm new password</label>
            <input id="reset-confirm" type="password" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button id="reset-btn" class="btn btn-primary" onclick="submitPasswordReset()">Change Password</button>
        <p id="reset-err" class="error-text hidden"></p>
    </div>
</div>

<!-- App -->
<div id="app" class="screen hidden">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-mark">T</div>
            <span class="brand-name">Ticketbot</span>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-item active" data-tab="rules"    onclick="switchTab('rules')">Rules</button>
            <button class="nav-item"        data-tab="forwards" onclick="switchTab('forwards')">Forwards</button>
            <button class="nav-item"        data-tab="users"    onclick="switchTab('users')">Users</button>
            <button class="nav-item"        data-tab="keys"     onclick="switchTab('keys')">Keys</button>
            <button class="nav-item"        data-tab="sync"     onclick="switchTab('sync')">Sync</button>
            <button class="nav-item"        data-tab="config"   onclick="switchTab('config')">Config</button>
            <button class="nav-item"        data-tab="logs"     onclick="switchTab('logs')">Logs</button>
        </nav>
        <div class="sidebar-footer">
            <button id="theme-toggle" class="sidebar-icon-btn" onclick="toggleTheme()" title="Toggle theme"></button>
            <div class="sidebar-account">
                <button class="sidebar-account-btn" onclick="toggleAccountMenu(event)">
                    <span id="header-email" class="sidebar-email">Account</span>
                    <span class="sidebar-caret">▾</span>
                </button>
                <div id="account-dropdown" class="account-dropdown hidden">
                    <div class="account-dropdown-email" id="dropdown-email">—</div>
                    <button class="account-dropdown-item" onclick="showChangePasswordModal()">Change Password</button>
                    <button id="totp-menu-btn" class="account-dropdown-item" onclick="handleTOTPMenuClick()"></button>
                    <button class="account-dropdown-item account-dropdown-item--danger" onclick="confirmRestart()">Restart Server</button>
                    <button class="account-dropdown-item account-dropdown-item--danger" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </aside>
    <div class="main-wrap">
        <main id="content" class="content"></main>
    </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="handleOverlayClick(event)">
    <div id="modal" class="modal">
        <div class="modal-header">
            <h2 id="modal-title"></h2>
            <button class="btn-icon" onclick="closeModal()">✕</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
        <div id="modal-footer" class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            <button id="modal-submit" class="btn btn-primary">Create</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
